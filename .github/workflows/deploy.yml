# Deploy Workflow

name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          submodules: true  # Initialize submodules

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'  # Use Node.js version 18

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy
        run: npm run deploy
        env:
          NODE_ENV: production

      - name: Log deployment errors
        if: failure()
        run: |
          echo "Deployment failed at $(date)" >> deploy-errors.log
          echo "$GITHUB_SHA" >> deploy-errors.log
          echo "Error details:
$GITHUB_ENV" >> deploy-errors.log
